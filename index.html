<!DOCTYPE html>
<html>
<head>
<title>Sudoku Solver</title>
<link rel="icon" href="sudoku project favicon.ico">
<style>

/* 🔥 default margin hata diya */
body {
    margin: 0;
}

/* 🔥 HERO HEADER */
.hero {
    height: 120px;
    background: linear-gradient(135deg, #36d1dc, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
}
.hero h1 {
    color: white;
    font-size: 32px;
}

/* 🔥 container center */
.container {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 30px;
}
h2 {
    margin-bottom: 15px;
}

/* 🔥 grid */
#grid, #solvedGrid {
    display: grid;
    grid-template-columns: repeat(9, 50px);
    gap: 5px;
    width: fit-content;
}

/* 🔥 3x3 bold lines */
#grid input:nth-child(3n),
#solvedGrid input:nth-child(3n) {
    border-right: 2px solid black;
}

#grid input:nth-child(n+19):nth-child(-n+27),
#grid input:nth-child(n+46):nth-child(-n+54),
#solvedGrid input:nth-child(n+19):nth-child(-n+27),
#solvedGrid input:nth-child(n+46):nth-child(-n+54) {
    border-bottom: 2px solid black;
}

/* 🔥 solved hidden initially */
#solvedSection {
    display: none;
}

/* 🔥 input styling */
input {
    width: 40px;
    height: 40px;
    text-align: center;
    font-size: 18px;
    border: 1px solid black;
}

/* 🔥 placeholder style (NEW 🔥) */
input::placeholder {
    color: gray;
}

/* 🔥 buttons */
.buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

button {
    padding: 12px 25px;
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* 🔥 footer */
.footer {
    margin-top: 50px;
    padding: 20px;
    text-align: center;
    background: linear-gradient(135deg, #36d1dc, #2a5298);
    color: white;
}

</style>
</head>

<body>

<!-- 🔥 HEADER -->
<div class="hero">
    <h1>Sudoku Solver</h1>
</div>

<!-- 🔥 MAIN -->
<div class="container">

    <div id="originalSection">
        <h2>Original</h2>
        <div id="grid"></div>
    </div>

    <div id="solvedSection">
        <h2>Solved</h2>
        <div id="solvedGrid"></div>
    </div>

</div>

<!-- 🔥 BUTTONS -->
<div class="buttons">
    <button id="solveBtn">Solve</button>
    <button id="resetBtn">Reset</button>
</div>

<script>

/* 🔥 GRID BANANA */
let grid = document.getElementById("grid");

for (let i = 0; i < 81; i++) {

    let input = document.createElement("input");
    input.maxLength = 1;

    input.placeholder = "."; // 🔥 NEW: user ko hint ki empty allowed hai

    let row = Math.floor(i / 9);
    let col = i % 9;

    input.setAttribute("data-row", row);
    input.setAttribute("data-col", col);

    input.addEventListener("input", function () {
        if (!/^[1-9]$/.test(input.value)) {
            input.value = "";
        }
    });

    grid.appendChild(input);
}

/* 🔥 SOLVE BUTTON */
document.getElementById("solveBtn").addEventListener("click", function () {

    let solveBtn = document.getElementById("solveBtn");

    solveBtn.innerText = "Solving..."; // 🔥 NEW: loading text
    solveBtn.disabled = true; // 🔥 NEW: double click avoid

    let inputs = document.querySelectorAll("#grid input");

    let board = [];

    for (let i = 0; i < 9; i++) {
        board[i] = [];
    }

    inputs.forEach(input => {
        let row = input.getAttribute("data-row");
        let col = input.getAttribute("data-col");

        let value = input.value === "" ? 0 : parseInt(input.value);
        board[row][col] = value;
    });

    fetch("https://sudoku-backend-production-4886.up.railway.app/solve", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ board: board })
    })
    .then(response => {

        if (!response.ok) {
            throw new Error("Backend error: " + response.status);
        }

        return response.json();
    })
    .then(result => {

        let solvedGrid = document.getElementById("solvedGrid");
        let solvedSection = document.getElementById("solvedSection");

        solvedGrid.innerHTML = "";
        solvedSection.style.display = "block";

        for (let i = 0; i < 9; i++) {
            for (let j = 0; j < 9; j++) {

                let input = document.createElement("input");

                input.value = result[i][j];
                input.disabled = true;

                solvedGrid.appendChild(input);
            }
        }
    })
    .catch(error => {
        console.error("ERROR:", error);
        alert("Please Check Your Input (It is either incomplete or wrong)");
    })
    .finally(() => {
        // 🔥 NEW: button wapas normal
        solveBtn.innerText = "Solve";
        solveBtn.disabled = false;
    });
});

/* 🔥 RESET */
document.getElementById("resetBtn").addEventListener("click", function () {

    let inputs = document.querySelectorAll("#grid input");

    inputs.forEach(input => {
        input.value = "";
    });

    document.getElementById("solvedSection").style.display = "none";
});

</script>

<!-- 🔥 FOOTER -->
<div class="footer">
    <p>Made by Lokesh Soni | Java Backend Developer</p>
    <p>📞 8595598458 | 📧 mrlokeshsoni001@gmail.com</p>
</div>

</body>
</html>
